<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Devis</title>
<style>
  :root{
    --ink:#1B2A4A;
    --ink-light:#2E4470;
    --paper:#F7F5EF;
    --card:#FFFFFF;
    --line:#E3E0D5;
    --line-strong:#C9C5B6;
    --text:#22262B;
    --muted:#6B6F76;
    --brass:#A6772E;
    --brass-light:#F1E6D2;
    --danger:#B3433A;
    --font-display: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:var(--font-body);background:var(--paper);color:var(--text);}
  #app{min-height:100vh;}

  .landing{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .landing-card{max-width:420px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:2.5rem 2rem;text-align:center;}
  .landing-card h1{font-family:var(--font-display);font-size:28px;margin:0 0 .25rem;color:var(--ink);}
  .landing-card p{color:var(--muted);font-size:14px;margin:0 0 1.75rem;}
  .member-btn{display:block;width:100%;text-align:left;padding:.85rem 1rem;margin-bottom:.6rem;background:var(--paper);border:1px solid var(--line);border-radius:3px;font-size:15px;color:var(--text);cursor:pointer;font-family:var(--font-body);}
  .member-btn:hover{border-color:var(--ink);}
  .add-member-row{display:flex;gap:.5rem;margin-top:1rem;}
  .add-member-row input{flex:1;}

  .shell{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--ink);color:#fff;flex-shrink:0;padding:1.5rem 0;position:relative;}
  .brand{font-family:var(--font-display);font-size:20px;padding:0 1.5rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.15);margin-bottom:1rem;}
  .brand small{display:block;font-family:var(--font-body);font-size:11px;color:#B9C2D6;font-weight:normal;letter-spacing:.04em;text-transform:uppercase;margin-top:2px;}
  .nav-item{display:block;width:100%;text-align:left;background:none;border:none;color:#D7DCE8;font-size:14px;padding:.7rem 1.5rem;cursor:pointer;font-family:var(--font-body);border-left:3px solid transparent;}
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:rgba(255,255,255,.09);border-left-color:var(--brass);color:#fff;}
  .sidebar-footer{margin-top:1.5rem;padding:0 1.5rem;font-size:12px;color:#9CA6BC;}
  .sidebar-footer button{background:none;border:none;color:#D7DCE8;text-decoration:underline;cursor:pointer;font-size:12px;padding:0;font-family:var(--font-body);}

  .main{flex:1;padding:2rem 2.5rem;max-width:1080px;}
  .page-title{font-family:var(--font-display);font-size:24px;color:var(--ink);margin:0 0 .25rem;}
  .page-sub{color:var(--muted);font-size:13px;margin:0 0 1.75rem;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:1.25rem 1.5rem;margin-bottom:1.25rem;}
  .row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;}
  .field{display:flex;flex-direction:column;gap:.3rem;margin-bottom:.9rem;}
  .field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  input, select, textarea{font-family:var(--font-body);font-size:14px;padding:.55rem .65rem;border:1px solid var(--line-strong);border-radius:3px;background:#fff;color:var(--text);}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--ink-light);outline-offset:1px;}
  input[type=color]{padding:.2rem;height:38px;width:60px;}
  button.btn{font-family:var(--font-body);font-size:13px;padding:.6rem 1.1rem;border-radius:3px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer;}
  button.btn:hover{background:var(--ink-light);}
  button.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line-strong);}
  button.btn.secondary:hover{border-color:var(--ink);}
  button.btn.small{padding:.35rem .7rem;font-size:12px;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);border-bottom:1px solid var(--line-strong);padding:.5rem .4rem;}
  td{padding:.6rem .4rem;border-bottom:1px solid var(--line);}
  .empty{color:var(--muted);font-size:13px;padding:1rem 0;text-align:center;}
  .badge{display:inline-block;font-size:11px;padding:.15rem .5rem;border-radius:10px;background:var(--brass-light);color:var(--brass);font-weight:bold;}
  .badge.facture{background:#E1EEE5;color:#2E7D4F;}
  .num{font-family:var(--font-mono);}
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--ink);color:#fff;padding:.7rem 1.1rem;border-radius:4px;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:999;}
  .hint{font-size:12px;color:var(--muted);margin:.4rem 0 0;}
  .divider{border:none;border-top:1px solid var(--line);margin:1.25rem 0;}
  .subhead{font-size:13px;font-weight:bold;color:var(--ink);margin:0 0 .75rem;}
  .company-pill{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .8rem;border-radius:20px;border:1px solid var(--line-strong);background:#fff;cursor:pointer;font-size:13px;margin:0 .5rem .5rem 0;}
  .company-pill.active{border-color:var(--ink);background:var(--paper);font-weight:bold;}
  .company-pill .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}

  .line-row{display:grid;grid-template-columns:2fr 90px 90px 100px 100px 32px;gap:.6rem;align-items:center;margin-bottom:.5rem;}
  .line-row .lt{font-family:var(--font-mono);text-align:right;font-size:13.5px;}
  .totals-box{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--line-strong);}
  .totals-row{display:flex;justify-content:space-between;padding:.35rem 0;font-size:15px;}
  .totals-row.ttc{font-weight:bold;font-size:19px;border-top:1px solid var(--line-strong);margin-top:.3rem;padding-top:.7rem;}
  .totals-row .num{font-family:var(--font-mono);}
  .rm-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;line-height:1;}

  /* ---- New devis paper (multi-company template) ---- */
  .paper-wrap{background:#DCD9CE;padding:1.5rem;border-radius:4px;overflow-x:auto;display:flex;justify-content:center;}
  .paper2{background:#fff;width:210mm;margin:0 auto;box-shadow:0 2px 10px rgba(0,0,0,.15);display:flex;flex-direction:column;font-size:13.5px;overflow:hidden;}
  .p2-banner{position:relative;padding:6px 32px;color:var(--text);display:flex;justify-content:space-between;align-items:center;overflow:hidden;min-height:0;background:#fff;}
  .p2-banner::after{content:'';position:absolute;top:0;right:0;bottom:0;width:45%;background:var(--p2-color, #1B2A4A);clip-path:polygon(28% 0,100% 0,100% 100%,0% 100%);z-index:0;}
  .p2-logo-img{max-height:85px;max-width:220px;object-fit:contain;position:relative;z-index:1;}
  .p2-logo-text{position:relative;z-index:1;color:var(--text);}
  .p2-logo-text .nm{font-family:var(--font-display);font-size:26px;font-weight:bold;line-height:1;color:var(--ink);}
  .p2-logo-text .tg{font-size:10px;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;opacity:.8;}
  .p2-devis-box{position:relative;z-index:1;text-align:right;color:#fff;}
  .p2-devis-box .ttl{font-family:var(--font-display);font-size:26px;font-weight:bold;letter-spacing:.03em;}
  .p2-devis-box .num{font-size:12px;opacity:.9;margin-top:2px;}
  .p2-devis-box .dt{font-size:12px;opacity:.9;}

  .p2-body{padding:20px 32px;flex:1;display:flex;flex-direction:column;}
  .p2-parties{display:flex;gap:18px;margin-bottom:16px;}
  .p2-party{flex:1;background:var(--paper);border:1px solid var(--line-strong);border-radius:4px;padding:14px 16px 12px;font-size:12px;line-height:1.45;}
  .p2-party .lbl{display:block;font-size:10.5px;font-weight:bold;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;}
  .p2-party strong{font-size:14px;}

  .p2-objet{border:1px solid var(--line-strong);border-radius:4px;margin-bottom:16px;overflow:hidden;background:var(--paper);padding:10px 16px;}
  .p2-objet .tag{display:block;color:var(--muted);font-size:10.5px;font-weight:bold;letter-spacing:.08em;margin:0 0 .5rem;text-transform:uppercase;}
  .p2-objet .txt{font-size:13px;}

  .p2-section-title{color:#fff;font-size:12.5px;font-weight:bold;letter-spacing:.04em;padding:.55rem 1rem;border-radius:3px 3px 0 0;margin-bottom:0;}
  .p2-table{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:16px;background:var(--paper);}
  .p2-table th{background:var(--paper);font-size:9.5px;text-transform:uppercase;color:var(--muted);padding:.6rem .4rem;text-align:left;border:1px solid var(--line);white-space:nowrap;}
  .p2-table th.wrap-th{white-space:normal;max-width:90px;line-height:1.3;}
  .p2-table td{padding:.65rem .4rem;border:1px solid var(--line);background:#fff;}
  .p2-table th:nth-child(6), .p2-table td:nth-child(6),
  .p2-table th:nth-child(7), .p2-table td:nth-child(7),
  .p2-table th:nth-child(8), .p2-table td:nth-child(8){white-space:nowrap;}
  .p2-table tr:last-child td{border-bottom:1px solid var(--line-strong);}

  .p2-bottom-row{display:flex;gap:20px;margin-bottom:20px;align-items:stretch;}
  .p2-conditions{flex:1.3;background:var(--paper);border:1px solid var(--line-strong);border-radius:4px;padding:18px 16px 14px;}
  .p2-conditions .lbl{display:block;font-size:10.5px;font-weight:bold;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:.5rem;}
  .p2-conditions ul{list-style:none;margin:0;padding:0;font-size:11.5px;line-height:1.65;}
  .p2-conditions li{margin-bottom:.6rem;}
  .p2-totals{flex:1;background:var(--paper);border:1px solid var(--line-strong);border-radius:4px;overflow:hidden;font-size:13px;}
  .p2-totals .r{display:flex;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--line);}
  .p2-totals .r.ttc{color:#fff;font-weight:bold;font-size:15px;border-bottom:none;}
  .p2-signbox{margin:10px 14px 14px;padding:10px;border:1px dashed var(--line-strong);border-radius:3px;text-align:center;font-size:12px;font-weight:bold;}

  .p2-icons-row{display:flex;gap:16px;margin-top:20px;padding-top:6px;font-size:11px;line-height:1.5;}
  .p2-icons-row > div{flex:1;padding:10px 4px;border-top:2px solid var(--line-strong);}
  .p2-icons-row .ic-title{font-weight:bold;font-size:11px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px;}
  .p2-icons-row .ic-desc{color:var(--muted);}

  .p2-tagline{color:#fff;text-align:center;padding:16px 20px;font-size:13px;}
  .p2-tagline .q{font-family:var(--font-display);font-style:italic;font-size:14px;}
  .p2-tagline .s{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;margin-top:4px;opacity:.9;}
  .p2-legal-footer{text-align:center;font-size:9.5px;color:var(--muted);line-height:1.6;padding:10px 20px;border-top:1px solid var(--line);}

  .cgv-page{margin-top:1.5rem;}
  .cgv-sheet{padding:16mm;font-size:12px;line-height:1.55;color:var(--text);}
  .cgv-header{display:flex;align-items:center;gap:.75rem;justify-content:space-between;border-bottom:1px solid var(--line-strong);padding-bottom:.75rem;margin-bottom:1.5rem;}
  .cgv-logo{max-height:36px;max-width:100px;object-fit:contain;}
  .cgv-header-title{font-size:11px;color:var(--muted);}
  .cgv-title{font-family:var(--font-display);font-size:20px;text-align:center;margin:0 0 1rem;}
  .cgv-meta{font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:1.25rem;}
  .cgv-intro{font-size:12.5px;margin-bottom:1.5rem;}
  .cgv-art-title{font-family:var(--font-display);font-size:14px;color:var(--ink);margin:1.25rem 0 .5rem;}
  .cgv-par{margin:0 0 .6rem;white-space:pre-line;}
  .cgv-footnote{font-size:11px;color:var(--muted);font-style:italic;margin-top:1.5rem;border-top:1px solid var(--line);padding-top:.75rem;}
  @media print{
    .cgv-page{margin-top:0;break-before:page;page-break-before:always;}
  }

  .paper2, .p2-banner, .p2-section-title, .p2-totals .r.ttc, .p2-tagline{
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    color-adjust: exact;
  }
  @media print{
    @page{ size:A4; margin:0; }
    *{ -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    body *{visibility:hidden;}
    #print-area, #print-area *{visibility:visible;}
    #print-area{position:absolute;top:0;left:0;width:100%;padding:0;margin:0;}
    .paper-wrap{background:none;padding:0;}
    .paper2{box-shadow:none;width:auto;margin:0;}
    .p2-banner{padding:6px 32px;}
    .p2-logo-img{max-height:65px;}
    .p2-devis-box .ttl{font-size:22px;}
    .p2-body{padding:12px 32px;}
    .p2-parties{margin-bottom:10px;}
    .p2-party{padding:10px 14px 8px;font-size:11px;line-height:1.3;}
    .p2-objet{margin-bottom:10px;padding:7px 14px;}
    .p2-table{margin-bottom:10px;font-size:11px;}
    .p2-table th, .p2-table td{padding:.4rem .4rem;}
    .p2-bottom-row{margin-bottom:10px;}
    .p2-conditions{padding:12px 14px 8px;}
    .p2-conditions ul{font-size:10.5px;line-height:1.45;}
    .p2-conditions li{margin-bottom:.35rem;}
    .p2-totals .r{padding:.45rem .9rem;}
    .p2-icons-row{margin-top:10px;font-size:10px;}
    .p2-icons-row > div{padding:6px 4px;}
    .p2-tagline{padding:8px 20px;}
    .p2-tagline .q{font-size:12px;}
    .p2-tagline .s{font-size:9px;}
    .p2-legal-footer{padding:6px 20px;font-size:8.5px;}
    tr{break-inside:avoid;page-break-inside:avoid;}
  }
  @media screen and (max-width: 720px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;padding:1rem;}
    .main{padding:1.25rem;}
    .line-row{grid-template-columns:1fr 70px 70px 80px 80px 28px;}
    .paper2{width:auto;min-height:0;}
    .p2-parties, .p2-bottom-row, .p2-icons-row{flex-direction:column;}
  }
</style>
</head>

let fbDb = null;
function firebaseReady(){ return FIREBASE_CONFIG.apiKey !== "REMPLACE_MOI"; }
function initFirebase(){
  if(!firebaseReady()) return;
  try{
    if(typeof firebase === 'undefined'){ console.warn('SDK Firebase non charg\u00e9'); return; }
    firebase.initializeApp(FIREBASE_CONFIG);
    fbDb = firebase.firestore();
  }catch(e){ console.error('Erreur init Firebase', e); fbDb = null; }
}

function withTimeout(promise, ms){
  return Promise.race([
    promise,
    new Promise((_, reject)=> setTimeout(()=> reject(new Error('timeout')), ms))
  ]);
}
async function sget(key, fallback){
  if(fbDb){
    try{
      const doc = await withTimeout(fbDb.collection(FIREBASE_COLLECTION).doc(key).get(), 6000);
      return doc.exists ? doc.data().value : fallback;
    }catch(e){ console.error('Firestore get error (bascule sur stockage local)', e); }
  }
  try{
    const r = await withTimeout(window.storage.get(key, true), 3000);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){
    try{
      const raw = localStorage.getItem(LS_PREFIX+key);
      return raw !== null ? JSON.parse(raw) : fallback;
    }catch(e2){ return fallback; }
  }
}
async function sset(key, value){
  if(fbDb){
    try{
      await withTimeout(fbDb.collection(FIREBASE_COLLECTION).doc(key).set({value: value}), 6000);
      return;
    }catch(e){ console.error('Firestore set error (bascule sur stockage local)', e); }
  }
  try{
    const r = await withTimeout(window.storage.set(key, JSON.stringify(value), true), 3000);
    if(r) return;
  }catch(e){}
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(value)); }catch(e2){ console.error(e2); }
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function clientFullName(c){ return c ? (c.nom + (c.prenom ? ' '+c.prenom : '')) : ''; }
function eur(n){ return (Math.round((n||0)*100)/100).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' \u20ac'; }
function todayStr(){ const d=new Date(); return d.toLocaleDateString('fr-FR'); }
function shadeColor(hex, percent){
  try{
    let f=parseInt(hex.slice(1),16), t=percent<0?0:255, p=Math.abs(percent);
    let R=f>>16, G=(f>>8)&0x00FF, B=f&0x0000FF;
    const nr = Math.round((t-R)*p)+R, ng = Math.round((t-G)*p)+G, nb = Math.round((t-B)*p)+B;
    return '#'+(0x1000000+nr*0x10000+ng*0x100+nb).toString(16).slice(1);
  }catch(e){ return hex; }
}

fier ses tarifs \u00e0 tout moment. Les Produits sont factur\u00e9s sur la base des prix en vigueur au jour de la commande."},{title:"ARTICLE 5 - CONDITIONS DE PAIEMENT",body:"Le paiement du mat\u00e9riel est exigible en totalit\u00e9 par l\u2019acheteur, sauf stipulation contraire \u00e9crite et pr\u00e9alable de BAWS.\nSauf accord \u00e9crit, le r\u00e8glement est effectu\u00e9 comptant \u00e0 la commande. Aucun escompte n\u2019est accord\u00e9 pour paiement anticip\u00e9.\nLe recours \u00e0 la garantie contractuelle ou l\u00e9gale ne peut justifier aucun retard de paiement. Tout d\u00e9faut de paiement entra\u00eene de plein droit la cessation de la garantie contractuelle.\nEn cas de retard de paiement, BAWS pourra exiger le paiement imm\u00e9diat de toutes les sommes dues, appliquer les int\u00e9r\u00eats de retard pr\u00e9vus par la r\u00e9glementation applicable et, pour les clients professionnels, l\u2019indemnit\u00e9 forfaitaire de recouvrement pr\u00e9vue par l\u2019article L441-10 du Code de commerce, sans pr\u00e9judice de tous dommages et int\u00e9r\u00eats."},{title:"ARTICLE 6 - LIVRAISON - R\u00c9CEPTION - R\u00c9CLAMATIONS",body:"Les d\u00e9lais de livraison sont donn\u00e9s \u00e0 titre indicatif. Un retard ne peut justifier l\u2019annulation de la commande ni l\u2019octroi de dommages et int\u00e9r\u00eats, sauf disposition d\u2019ordre public applicable au consommateur.\nLes marchandises voyagent aux risques et p\u00e9rils du CLIENT, sauf stipulation contraire \u00e9crite. Le CLIENT doit contr\u00f4ler l\u2019\u00e9tat et la conformit\u00e9 des Produits au moment de la livraison (emballages, r\u00e9f\u00e9rences, quantit\u00e9s, avaries).\nLes r\u00e9clamations portant sur des vices apparents ou sur la non-conformit\u00e9 du mat\u00e9riel livr\u00e9 \u00e0 la commande doivent \u00eatre formul\u00e9es au plus tard dans un d\u00e9lai de sept (7) jours \u00e0 compter de la livraison. \u00c0 d\u00e9faut, le Produit livr\u00e9 sera consid\u00e9r\u00e9 comme conforme et la livraison d\u00e9finitive.\nToutes les r\u00e9clamations, demandes d\u2019\u00e9change ou de remboursement doivent s\u2019effectuer par voie postale \u00e0 l\u2019adresse suivante : BAWS - 231 Rue Saint Honor\u00e9 - 75001 PARIS, dans un d\u00e9lai de trente (30) jours apr\u00e8s livraison.\nAucun retour de mat\u00e9riel ne pourra \u00eatre effectu\u00e9 sans l\u2019accord pr\u00e9alable expr\u00e8s et \u00e9crit de BAWS. Les frais de transport et de remise en stock \u00e9ventuels sont en toute hypoth\u00e8se \u00e0 la charge du CLIENT."},{title:"ARTICLE 7 - GARANTIES L\u00c9GALES",body:"Tous les Produits fournis par BAWS b\u00e9n\u00e9ficient de la garantie l\u00e9gale contre les vices cach\u00e9s (articles 1641 et suivants du Code civil) et de la garantie l\u00e9gale de conformit\u00e9 (articles L217-1 et suivants du Code de la consommation).\nLe CLIENT dispose d\u2019un d\u00e9lai de deux (2) ans \u00e0 compter de la r\u00e9ception du bien pour agir. Il peut choisir entre la r\u00e9paration ou le remplacement du bien, sous r\u00e9serve des conditions de co\u00fbts pr\u00e9vues par la loi.\nLe CLIENT est dispens\u00e9 de rapporter la preuve de l\u2019existence du d\u00e9faut de conformit\u00e9 du bien durant les vingt-quatre (24) mois suivant la d\u00e9livrance du bien (hors biens d\u2019occasion).\nLa preuve du vice ou du d\u00e9faut all\u00e9gu\u00e9 incombe au CLIENT."},{title:"ARTICLE 8 - GARANTIE FABRICANT / GARANTIE CONTRACTUELLE TOSHIBA",body:"Certains Produits peuvent b\u00e9n\u00e9ficier d\u2019une \u00ab Garantie Fabricant \u00bb. BAWS n\u2019\u00e9tant pas partie \u00e0 cette garantie, BAWS ne saurait \u00eatre tenue responsable en cas de refus du fabricant d\u2019appliquer sa garantie.\nPour les mat\u00e9riels TOSHIBA, la garantie contractuelle constructeur ne pourra \u00eatre valid\u00e9e que sur pr\u00e9sentation d\u2019une facture de mise en service effectu\u00e9e par un professionnel agr\u00e9\u00e9 par le constructeur :\n\u2022 Garantie de 3 ans pour les pi\u00e8ces.\n\u2022 Garantie de 5 ans pour le compresseur.\nLa garantie s\u2019applique aux d\u00e9fauts de mati\u00e8res premi\u00e8res, vices de construction ou de fonctionnement non apparent. La r\u00e9paration et les remplacements effectu\u00e9s dans le cadre de la garantie ne font pas courir une nouvelle dur\u00e9e de garantie et ne prolongent pas la garantie initiale.\nLe CLIENT doit imp\u00e9rativement, pour b\u00e9n\u00e9ficier de la pr\u00e9sente garantie, signaler par \u00e9crit \u00e0 BAWS tout d\u00e9faut ou vice constat\u00e9 dans les huit (8) jours calendaires suivant sa constatation, en joignant la facture d\u2019achat.\nLa pr\u00e9sente garantie contractuelle est limit\u00e9e \u00e0 l\u2019\u00e9change des pi\u00e8ces d\u00e9tach\u00e9es reconnues d\u00e9fectueuses et \u00e0 la mise \u00e0 disposition de nouvelles pi\u00e8ces d\u00e9tach\u00e9es, gratuitement, pendant la p\u00e9riode susmentionn\u00e9e, \u00e0 l\u2019exclusion de toute autre garantie contractuelle ou l\u00e9gale.\nL\u2019envoi de mat\u00e9riel ou de pi\u00e8ces d\u00e9tach\u00e9es au titre de la garantie est effectu\u00e9 par un transport non express et au tarif normal, \u00e0 la discr\u00e9tion de BAWS.\nIl est express\u00e9ment stipul\u00e9 que la garantie du vendeur n\u2019est applicable que pour les mat\u00e9riels et pi\u00e8ces d\u00e9tach\u00e9es neufs vendus par BAWS au premier acqu\u00e9reur sur toute l\u2019\u00e9tendue du territoire m\u00e9tropolitain fran\u00e7ais.\nEn vue de satisfaire aux obligations d\u00e9coulant de cette garantie, BAWS se r\u00e9serve le droit de mettre \u00e0 disposition du CLIENT des pi\u00e8ces d\u00e9tach\u00e9es dont les fonctionnalit\u00e9s sont similaires. Les pi\u00e8ces remplac\u00e9es au titre de la garantie contractuelle reviendront \u00e0 BAWS en propri\u00e9t\u00e9. Les \u00e9changes de pi\u00e8ces faits au titre de la garantie contractuelle ne sauraient avoir pour effet de prolonger celle-ci."},{title:"ARTICLE 9 - EXCLUSIONS DE GARANTIE",body:"La garantie ne couvre pas :\n\u2022 Le remplacement des consommables.\n\u2022 La main d\u2019\u0153uvre, les d\u00e9placements, ni les communications vers la hotline d\u2019une marque.\n\u2022 L\u2019utilisation anormale ou non conforme des Produits.\n\u2022 Les pannes li\u00e9es aux accessoires.\n\u2022 Les d\u00e9fauts et cons\u00e9quences dus \u00e0 un r\u00e9parateur non agr\u00e9\u00e9 par BAWS ou le fabricant.\n\u2022 Les d\u00e9fauts et cons\u00e9quences dus \u00e0 une utilisation non conforme \u00e0 l\u2019usage auquel le Produit est destin\u00e9.\n\u2022 L\u2019absence de garantie lorsque les conditions normales de stockage, d\u2019installation, d\u2019utilisation et d\u2019entretien ne sont pas respect\u00e9es.\nLa garantie contractuelle ne saurait en aucun cas s\u2019\u00e9tendre, au seul jugement de BAWS, notamment :\n\u2022 Aux d\u00e9t\u00e9riorations et avaries r\u00e9sultant d\u2019une insuffisance d\u2019entretien, d\u2019une installation non conforme aux recommandations du fabricant et/ou aux r\u00e8gles de l\u2019art, d\u2019inobservation des consignes remises avec chaque appareil, d\u2019accident, d\u2019usage anormal ou abusif, d\u2019usure normale du mat\u00e9riel, ou d\u2019un stockage dans de mauvaises conditions.\n\u2022 Aux pi\u00e8ces d\u2019usure courante et aux fluides (tels que gaz r\u00e9frig\u00e9rants, huile, d\u00e9shydrateur, filtres, lampes de signalisation, courroies, etc.), aux d\u00e9t\u00e9riorations dues \u00e0 un sinistre ou \u00e0 un usage anormal du mat\u00e9riel, aux d\u00e9t\u00e9riorations caus\u00e9es par un mat\u00e9riel ou des pi\u00e8ces non fournis par BAWS, ou par un mat\u00e9riel de manutention pour le d\u00e9placement des grosses pi\u00e8ces.\n\u2022 En cas d\u2019absence de plaque signal\u00e9tique sur le mat\u00e9riel ne permettant pas son identification.\n\u2022 En cas d\u2019utilisation de fluides ne correspondant pas aux prescriptions du constructeur, d\u2019alimentations d\u00e9fectueuses en courant \u00e9lectrique ou en eau, de modifications ou transformations apport\u00e9es au mat\u00e9riel.\nLe recours \u00e0 la garantie contractuelle ne peut justifier aucun retard de paiement ; tout d\u00e9faut de paiement entra\u00eene de plein droit la cessation de la garantie. Aucun retour du mat\u00e9riel ne pourra \u00eatre effectu\u00e9 par le CLIENT sans l\u2019accord pr\u00e9alable expr\u00e8s et \u00e9crit de BAWS. Les frais de transport et de remise en stock \u00e9ventuels sont en toute hypoth\u00e8se \u00e0 la charge du CLIENT."},{title:"ARTICLE 10 - PI\u00c8CES D\u00c9TACH\u00c9ES",body:"La fourniture des pi\u00e8ces d\u00e9tach\u00e9es indispensables \u00e0 l\u2019utilisation des Produits de BAWS est assur\u00e9e pendant une dur\u00e9e de sept (7) ans \u00e0 compter de la date de fabrication des Produits."},{title:"ARTICLE 11 - LIMITATION DE RESPONSABILIT\u00c9",body:"BAWS ne pourra \u00eatre tenue responsable que des dommages directs et pr\u00e9visibles. La responsabilit\u00e9 de BAWS est, en tout \u00e9tat de cause, limit\u00e9e au montant HT du Produit concern\u00e9 tel que factur\u00e9.\nBAWS ne saurait \u00eatre tenue responsable des dommages indirects, pertes d\u2019exploitation, pertes de chiffre d\u2019affaires, pertes de donn\u00e9es, pr\u00e9judice commercial ou d\u2019image."},{title:"ARTICLE 12 - R\u00c9SERVE DE PROPRI\u00c9T\u00c9",body:"Les Produits demeurent la propri\u00e9t\u00e9 de BAWS jusqu\u2019au paiement int\u00e9gral du prix, en principal et accessoires. En cas de non-paiement, BAWS pourra revendiquer les Produits, sans pr\u00e9judice de toutes autres actions."},{title:"ARTICLE 13 - DONN\u00c9ES \u00c0 CARACT\u00c8RE PERSONNEL",body:"La soci\u00e9t\u00e9 BAWS s'engage \u00e0 pr\u00e9server la confidentialit\u00e9 des informations fournies par l\u2019acheteur, qu'il serait amen\u00e9 \u00e0 transmettre pour l'utilisation de certains services.\nToute information le concernant est soumise aux dispositions de la loi n\u00b0 78-17 du 6 janvier 1978. \u00c0 ce titre, l'internaute dispose d'un droit d'acc\u00e8s, de modification et de suppression des informations le concernant. Il peut en faire la demande \u00e0 tout moment par courrier \u00e0 l\u2019adresse suivante : BAWS - 231 Rue Saint Honor\u00e9 - 75001 PARIS."},{title:"ARTICLE 14 - DROIT APPLICABLE - JURIDICTION",body:"Les pr\u00e9sentes CGV sont soumises au droit fran\u00e7ais.\nTout litige relatif \u00e0 l\u2019interpr\u00e9tation, l\u2019ex\u00e9cution ou la validit\u00e9 des pr\u00e9sentes CGV sera soumis aux tribunaux comp\u00e9tents de PARIS, sauf disposition imp\u00e9rative contraire applicable aux consommateurs."}],

async function loadAll(){
  state.team = await sget('team', []);
  state.clients = await sget('clients', []);
  state.articles = await sget('articles', []);
  state.documents = await sget('documents', []);
  state.counters = await sget('counters', {devis:0, facture:0});
  const co = await sget('companies', null);
  if(co && co.length){
    state.companies = co.map(c=>{
      const def = DEFAULT_COMPANIES.find(d=>d.id===c.id);
      return def ? Object.assign({}, def, c) : c;
    });
  }else{
    state.companies = JSON.parse(JSON.stringify(DEFAULT_COMPANIES));
  }
  const acc = await sget('accounts', null);
  if(acc && acc.length){
    state.accounts = acc;
  } else {
    state.accounts = JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS));
    await sset('accounts', state.accounts);
  }
  const jr = await sget('journals', null);
  if(jr && jr.length){
    state.journals = jr;
  } else {
    state.journals = JSON.parse(JSON.stringify(DEFAULT_JOURNALS));
    await sset('journals', state.journals);
  }
  state.entries = await sget('entries', []);
}

function showToast(msg){
  state.toast = msg;

  setTimeout(()=>{ state.toast=null; render(); }, 2200);
}

function captureFocus(){
  const el = document.activeElement;
  if(!el || el === document.body || !el.tagName) return null;
  const tag = el.tagName.toLowerCase();
  if(tag !== 'input' && tag !== 'select' && tag !== 'textarea') return null;
  let selector = null;
  if(el.id){
    selector = '#'+CSS.escape(el.id);
  } else {
    const dataAttrs = Array.prototype.filter.call(el.attributes, a=>a.name.indexOf('data-')===0);
    if(dataAttrs.length){
      selector = tag + dataAttrs.map(a=>`[${a.name}="${a.value.replace(/"/g,'\\"')}"]`).join('');
    }
  }
  if(!selector) return null;
  let start=null, end=null;
  try{ start = el.selectionStart; end = el.selectionEnd; }catch(e){}
  return { selector, start, end };
}
function restoreFocus(info){
  if(!info) return;
  let el;
  try{ el = document.querySelector(info.selector); }catch(e){ return; }
  if(!el) return;
  el.focus();
  if(info.start!=null && info.end!=null && el.setSelectionRange){
    try{ el.setSelectionRange(info.start, info.end); }catch(e){}
  }
}
function render(){
  const focusInfo = captureFocus();
  const app = document.getElementById('app');
  if(!state.authenticated){
    app.innerHTML = renderLogin();
    bindLogin();
    restoreFocus(focusInfo);
    return;
  }
  if(!state.currentUser){
    app.innerHTML = renderLanding();
    bindLanding();
    restoreFocus(focusInfo);
    return;
  }
  app.innerHTML = renderShell();
  bindShell();
  restoreFocus(focusInfo);
}

const AUTH_USER = 'admin';
const AUTH_PASS = 'Williammathis2004';
const AUTH_KEY = 'atelier-devis-auth';

function renderLogin(){
  return `
  <div class="landing">
    <div class="landing-card">
      <h1>Atelier Devis</h1>
      <p>Connexion \u00e0 l'espace de l'\u00e9quipe.</p>
      <div class="field" style="text-align:left">
        <label>Identifiant</label>
        <input type="text" id="login-user" autocomplete="username">
      </div>
      <div class="field" style="text-align:left">
        <label>Mot de passe</label>
        <input type="password" id="login-pass" autocomplete="current-password">
      </div>
      <label style="display:flex;align-items:center;gap:.5rem;font-size:13px;margin:.5rem 0 1rem;cursor:pointer;text-align:left">
        <input type="checkbox" id="login-remember" checked style="width:auto">
        Se souvenir de moi sur cet appareil
      </label>
      <p id="login-error" style="color:var(--danger);font-size:13px;display:none;margin-bottom:.75rem">Identifiant ou mot de passe incorrect.</p>
      <button class="btn" id="login-btn" style="width:100%">Se connecter</button>
    </div>
  </div>`;
}
function bindLogin(){
  const doLogin = async ()=>{
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    if(u === AUTH_USER && p === AUTH_PASS){
      state.authenticated = true;
      if(document.getElementById('login-remember').checked){
        try{ localStorage.setItem(AUTH_KEY, '1'); }catch(e){}
      }
      render();
    }else{
      document.getElementById('login-error').style.display = 'block';
    }
  };
  document.getElementById('login-btn').onclick = doLogin;
  document.getElementById('login-pass').onkeydown = (e)=>{ if(e.key==='Enter') doLogin(); };
}

function renderLanding(){
  return `
  <div class="landing">
    <div class="landing-card">
      <h1>Atelier Devis</h1>
      <p>Choisissez votre nom pour acc\u00e9der \u00e0 l'espace de l'\u00e9quipe.</p>
      ${state.team.length ? state.team.map(m=>`<button class="member-btn" data-pick="${m}">${m}</button>`).join('') : `<p class="empty">Personne pour l'instant, ajoutez-vous ci-dessous.</p>`}
      <div class="add-member-row">
        <input type="text" id="new-member" placeholder="Votre pr\u00e9nom">
        <button class="btn" id="add-member-btn">Ajouter</button>
      </div>
    </div>
  </div>`;
}
function bindLanding(){
  document.querySelectorAll('[data-pick]').forEach(b=>{
    b.onclick = ()=>{ state.currentUser = b.dataset.pick; render(); };
  });
  document.getElementById('add-member-btn').onclick = async ()=>{
    const inp = document.getElementById('new-member');
    const name = inp.value.trim();
    if(!name) return;
    if(!state.team.includes(name)) state.team.push(name);
    await sset('team', state.team);
    state.currentUser = name;
    render();
  };
}

function renderShell(){

function calcTotals(b){
  const ht = b.lignes.reduce((s,l)=> s + l.qty*l.pu, 0);
  const tva = ht * (b.tva/100);
  const ttc = ht + tva;
  const eco = b.lignes.reduce((s,l)=>{
    const art = state.articles.find(a=>a.id===l.articleId);
    return s + (art && art.eco ? art.eco : 0);
  }, 0);
  return {ht,tva,ttc,eco};
}

      if(art){ b.lignes[i].articleId = art.id; b.lignes[i].pu = art.vente; render(); }

  document.querySelectorAll('[data-line-pu]').forEach(inp=>{

    if(!b.lignes.length || b.lignes.some(l=>!l.articleId)){ showToast('Ajoutez au moins une ligne compl\u00e8te'); return; }
    if(b.editingDocId){
      const existing = state.documents.find(d=>d.id===b.editingDocId);

        existing.companyId = b.companyId;

        sset('documents', state.documents).catch(()=>{});

      return;
    }
    state.counters.devis += 1;
    const numero = 'D-' + new Date().getFullYear() + '-' + String(state.counters.devis).padStart(4,'0');

      travauxSameAsClient: b.travauxSameAsClient!==false,
      travauxNom: b.travauxNom||'', travauxAdresse: b.travauxAdresse||'', travauxCp: b.travauxCp||'', travauxVille: b.travauxVille||'',
      lignes: JSON.parse(JSON.stringify(b.lignes)), tva: b.tva, notes: '',
    };
    state.documents.push(doc);
    showToast('Devis ' + numero + ' enregistr\u00e9');
    state.builder = { clientId:'', companyId: b.companyId, objet:'', infoComp:'', lignes:[], tva: b.tva, notes:'' };
    state.viewingDoc = doc.id;
    render();
    sset('documents', state.documents).catch(()=>{});
    sset('counters', state.counters).catch(()=>{});
  };
  const cancelEditBtn = document.getElementById('cancel-edit-devis');
  if(cancelEditBtn) cancelEditBtn.onclick = ()=>{
    const backId = b.editingDocId;
    state.builder = { clientId:'', companyId: b.companyId, objet:'', lignes:[], tva:20, notes:'', editingDocId:null };
    state.viewingDoc = backId;
    render();
  };
}

      if(!docs.length) return `<tr><td colspan="7" class="empty">Aucune ligne pour l'instant.</td></tr>`;

      let totVenteAll = 0, totAchatAll = 0;
      docs.forEach(d=>{
        const c = state.clients.find(c=>c.id===d.clientId);
        let subVente = 0, subAchat = 0;
        d.lignes.forEach(l=>{
          const art = state.articles.find(a=>a.id===l.articleId);
          const vente = l.qty*l.pu;
          const achat = art? l.qty*(art.achat||0) : 0;
          subVente += vente; subAchat += achat;

        totVenteAll += subVente; totAchatAll += subAchat;

      return out;
    })()}
  </table>`;
}

          <option value="">\u2014 Compte \u2014</option>
          ${state.accounts.slice().sort((a,c)=>a.code.localeCompare(c.code)).map(a=>`<option value="${a.id}" ${l.compte===a.id?'selected':''}>${a.code} \u2014 ${a.label}</option>`).join('')}

function bindSaisieEcriture(){
  const b = state.entryBuilder;
  document.getElementById('ec-journal').onchange = (e)=>{ b.journal = e.target.value; render(); };
  document.getElementById('ec-date').oninput = (e)=>{ b.date = e.target.value; };
  document.getElementById('ec-facture').oninput = (e)=>{ b.factureNum = e.target.value; };
  document.getElementById('add-ec-line').onclick = ()=>{ b.lignes.push({compte:'',libelle:'',debit:'',credit:''}); render(); };
  document.querySelectorAll('[data-ec-compte]').forEach(sel=>{
    sel.onchange = (e)=>{
      const i = +sel.dataset.ecCompte;
      b.lignes[i].compte = e.target.value;
      const acc = state.accounts.find(a=>a.id===e.target.value);
      if(acc && !b.lignes[i].libelle) b.lignes[i].libelle = acc.label;
      render();
    };
  });
  document.querySelectorAll('[data-ec-libelle]').forEach(inp=>{
    inp.oninput = (e)=>{ b.lignes[+inp.dataset.ecLibelle].libelle = e.target.value; };
  });
  document.querySelectorAll('[data-ec-debit]').forEach(inp=>{
    inp.oninput = (e)=>{ b.lignes[+inp.dataset.ecDebit].debit = e.target.value; render(); };
  });
  document.querySelectorAll('[data-ec-credit]').forEach(inp=>{
    inp.oninput = (e)=>{ b.lignes[+inp.dataset.ecCredit].credit = e.target.value; render(); };
  });
  document.querySelectorAll('[data-ec-del]').forEach(btn=>{
    btn.onclick = ()=>{ b.lignes.splice(+btn.dataset.ecDel,1); render(); };
  });
  const saveBtn = document.getElementById('save-ecriture');
  if(saveBtn) saveBtn.onclick = async ()=>{
    if(!b.journal){ showToast('Choisissez un journal'); return; }
    if(!b.date){ showToast('Choisissez une date'); return; }
    const journal = state.journals.find(j=>j.id===b.journal);
    if(!journal) return;
    const totDebit = b.lignes.reduce((s,l)=>s+(parseFloat(l.debit)||0),0);
    const totCredit = b.lignes.reduce((s,l)=>s+(parseFloat(l.credit)||0),0);
    if(Math.abs(totDebit-totCredit) >= 0.005){ showToast('D\u00e9bit et cr\u00e9dit doivent \u00eatre \u00e9gaux'); return; }
    if(b.lignes.some(l=>!l.compte)){ showToast('Chaque ligne doit avoir un compte'); return; }
    const pieceNum = journal.nextPiece;
    const entry = {
      id: uid(), journalId: journal.id, date: b.date, factureNum: b.factureNum, pieceNum,
      lignes: JSON.parse(JSON.stringify(b.lignes)), auteur: state.currentUser,
    };
    state.entries.push(entry);
    journal.nextPiece += 1;
    await sset('entries', state.entries);
    await sset('journals', state.journals);
    showToast('\u00c9criture n\u00b0 ' + pieceNum + ' enregistr\u00e9e');
    state.entryBuilder = { journal: b.journal, date: b.date, factureNum:'', lignes:[{compte:'', libelle:'', debit:'', credit:''}] };
    render();
  };
}

function renderBalance(){
  const totals = {};
  state.entries.forEach(en=>{
    en.lignes.forEach(l=>{
      if(!l.compte) return;
      if(!totals[l.compte]) totals[l.compte] = {debit:0, credit:0};
      totals[l.compte].debit += parseFloat(l.debit)||0;
      totals[l.compte].credit += parseFloat(l.credit)||0;
    });
  });
  const rows = Object.keys(totals).map(accId=>{
    const acc = state.accounts.find(a=>a.id===accId);
    return { code: acc? acc.code : '?', label: acc? acc.label : '(compte supprim\u00e9)', debit: totals[accId].debit, credit: totals[accId].credit };
  }).sort((a,b)=>a.code.localeCompare(b.code));
  const totDebit = rows.reduce((s,r)=>s+r.debit,0);
  const totCredit = rows.reduce((s,r)=>s+r.credit,0);
  return `
  <p class="page-sub">Cumul des montants par compte, toutes \u00e9critures confondues.</p>
  <table>
    <tr><th>Code</th><th>Libell\u00e9</th><th>D\u00e9bit cumul\u00e9</th><th>Cr\u00e9dit cumul\u00e9</th><th>Solde</th></tr>
    ${rows.length ? rows.map(r=>`<tr>
      <td class="num">${r.code}</td>
      <td>${r.label}</td>
      <td class="num">${eur(r.debit)}</td>
      <td class="num">${eur(r.credit)}</td>
      <td class="num">${eur(r.debit-r.credit)}</td>
    </tr>`).join('') + `<tr><td colspan="2" style="font-weight:bold">Total</td><td class="num" style="font-weight:bold">${eur(totDebit)}</td><td class="num" style="font-weight:bold">${eur(totCredit)}</td><td class="num" style="font-weight:bold">${eur(totDebit-totCredit)}</td></tr>`
    : `<tr><td colspan="5" class="empty">Aucune \u00e9criture pour l'instant.</td></tr>`}
  </table>`;
}

function computeAccountBalances(){
  const totals = {};
  state.entries.forEach(en=>{
    en.lignes.forEach(l=>{
      if(!l.compte) return;
      if(!totals[l.compte]) totals[l.compte] = {debit:0, credit:0};
      totals[l.compte].debit += parseFloat(l.debit)||0;
      totals[l.compte].credit += parseFloat(l.credit)||0;
    });
  });
  return Object.keys(totals).map(accId=>{
    const acc = state.accounts.find(a=>a.id===accId);
    const debit = totals[accId].debit, credit = totals[accId].credit;
    return { code: acc? acc.code : '?', label: acc? acc.label : '(compte supprim\u00e9)', debit, credit, solde: debit-credit };
  }).sort((a,b)=>a.code.localeCompare(b.code));
}
function computeResultatNet(rows){
  const produits = rows.filter(r=>r.code.startsWith('7')).reduce((s,r)=>s+(r.credit-r.debit),0);
  const charges = rows.filter(r=>r.code.startsWith('6')).reduce((s,r)=>s+(r.debit-r.credit),0);
  return { produits, charges, net: produits-charges };
}

function renderCompteResultat(){
  const rows = computeAccountBalances();
  const charges = rows.filter(r=>r.code.startsWith('6') && r.solde!==0);
  const produits = rows.filter(r=>r.code.startsWith('7') && r.solde!==0);
  const { produits: totProduits, charges: totCharges, net } = computeResultatNet(rows);
  return `
  <p class="page-sub">Charges (classe 6) et produits (classe 7) cumul\u00e9s, toutes \u00e9critures confondues.</p>
  <div class="row" style="align-items:flex-start;gap:1.25rem">
    <div class="card" style="flex:1;min-width:280px">
      <div class="subhead">Charges</div>
      <table>
        <tr><th>Code</th><th>Libell\u00e9</th><th style="text-align:right">Montant</th></tr>

          <td>${r.label}</td>
          <td class="num" style="text-align:right">${eur(r.debit-r.credit)}</td>
        </tr>`).join('') : `<tr><td colspan="3" class="empty">Aucune charge.</td></tr>`}
        <tr><td colspan="2" style="font-weight:bold">Total charges</td><td class="num" style="text-align:right;font-weight:bold">${eur(totCharges)}</td></tr>
      </table>
    </div>
    <div class="card" style="flex:1;min-width:280px">
      <div class="subhead">Produits</div>
      <table>
        <tr><th>Code</th><th>Libell\u00e9</th><th style="text-align:right">Montant</th></tr>
        ${produits.length ? produits.map(r=>`<tr>
          <td class="num">${r.code}</td>
          <td>${r.label}</td>
          <td class="num" style="text-align:right">${eur(r.credit-r.debit)}</td>
        </tr>`).join('') : `<tr><td colspan="3" class="empty">Aucun produit.</td></tr>`}
        <tr><td colspan="2" style="font-weight:bold">Total produits</td><td class="num" style="text-align:right;font-weight:bold">${eur(totProduits)}</td></tr>
      </table>
    </div>
  </div>
  <div class="card" style="margin-top:1.25rem">
    <div class="totals-row ttc"><span>${net>=0 ? 'R\u00e9sultat net (b\u00e9n\u00e9fice)' : 'R\u00e9sultat net (perte)'}</span><span class="num">${eur(net)}</span></div>
  </div>`;

function renderBilan(){
  const rows = computeAccountBalances();
  const { net } = computeResultatNet(rows);
  const bilanRows = rows.filter(r=>!r.code.startsWith('6') && !r.code.startsWith('7'));
  const actif = bilanRows.filter(r=>r.solde>0);
  const passif = bilanRows.filter(r=>r.solde<0).map(r=>({...r, montant: -r.solde}));
  const totActif = actif.reduce((s,r)=>s+r.solde,0);
  const totPassifComptes = passif.reduce((s,r)=>s+r.montant,0);
  const totPassif = totPassifComptes + net;
  return `
  <p class="page-sub">Actif (soldes d\u00e9biteurs) et passif (soldes cr\u00e9diteurs), classes 1 \u00e0 5, avec int\u00e9gration du r\u00e9sultat de l'exercice.</p>
  <div class="row" style="align-items:flex-start;gap:1.25rem">
    <div class="card" style="flex:1;min-width:280px">
      <div class="subhead">Actif</div>
      <table>
        <tr><th>Code</th><th>Libell\u00e9</th><th style="text-align:right">Montant</th></tr>
        ${actif.length ? actif.map(r=>`<tr>
          <td class="num">${r.code}</td>
          <td>${r.label}</td>
          <td class="num" style="text-align:right">${eur(r.solde)}</td>
        </tr>`).join('') : `<tr><td colspan="3" class="empty">Aucun compte d'actif.</td></tr>`}
        <tr><td colspan="2" style="font-weight:bold">Total actif</td><td class="num" style="text-align:right;font-weight:bold">${eur(totActif)}</td></tr>
      </table>
    </div>
    <div class="card" style="flex:1;min-width:280px">
      <div class="subhead">Passif</div>
      <table>
        <tr><th>Code</th><th>Libell\u00e9</th><th style="text-align:right">Montant</th></tr>
        ${passif.length ? passif.map(r=>`<tr>
          <td class="num">${r.code}</td>
          <td>${r.label}</td>
          <td class="num" style="text-align:right">${eur(r.montant)}</td>
        </tr>`).join('') : `<tr><td colspan="3" class="empty">Aucun compte de passif.</td></tr>`}
        <tr>
          <td class="num">120000</td>
          <td>R\u00e9sultat de l'exercice ${net<0 ? '(perte)' : ''}</td>
          <td class="num" style="text-align:right">${eur(net)}</td>
        </tr>
        <tr><td colspan="2" style="font-weight:bold">Total passif</td><td class="num" style="text-align:right;font-weight:bold">${eur(totPassif)}</td></tr>
      </table>
    </div>
  </div>
  ${Math.abs(totActif-totPassif) > 0.01 ? `<p class="hint" style="color:var(--danger)">\u00c9cart Actif / Passif : ${eur(totActif-totPassif)} \u2014 v\u00e9rifiez que chaque \u00e9criture est bien \u00e9quilibr\u00e9e (d\u00e9bit = cr\u00e9dit).</p>` : `<p class="hint">Bilan \u00e9quilibr\u00e9 : Actif = Passif.</p>`}`;
}

        </div>
      </div>

        <span class="tag">OBJET :</span>

function bindDocView(){
  document.getElementById('back-btn').onclick = ()=>{ state.viewingDoc=null; render(); };
  document.getElementById('pdf-btn').onclick = ()=>{
    showToast("Choisis \u00ab Enregistrer en PDF \u00bb comme destination dans la fen\u00eatre qui s'ouvre");
    window.print();
  };
  document.getElementById('email-btn').onclick = ()=>{
    const d = state.documents.find(x=>x.id===state.viewingDoc);
    const c = state.clients.find(c=>c.id===d.clientId);
    const title = d.type==='facture' ? 'Facture' : 'Devis';
    const body = `Bonjour,\n\nSuite \u00e0 votre demande, vous trouverez ci-joint notre devis relatif \u00e0 la fourniture d'unit\u00e9s de climatisation.\n\nNous esp\u00e9rons que cette proposition r\u00e9pondra \u00e0 vos attentes. Nous restons \u00e0 votre enti\u00e8re disposition pour toute pr\u00e9cision ou pour \u00e9changer sur votre projet et adapter notre offre si n\u00e9cessaire.\n\nDans l'attente de votre retour, nous vous remercions de votre confiance et vous prions d'agr\u00e9er, Madame, Monsieur, l'expression de nos salutations distingu\u00e9es.\n\nCordialement,\n${d.auteur}`;
    const subject = `${title} ${d.numero}`;
    const to = (c && c.email) ? c.email : '';
    showToast("N'oublie pas de joindre le PDF t\u00e9l\u00e9charg\u00e9 \u00e0 l'email !");
    window.location.href = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  };
  const editBtn = document.getElementById('edit-devis-btn');
  if(editBtn) editBtn.onclick = ()=>{
    const d = state.documents.find(x=>x.id===state.viewingDoc);
    state.builder = {
      clientId: d.clientId, companyId: d.companyId, objet: d.objet||'', infoComp: d.infoComp||'',
      travauxSameAsClient: d.travauxSameAsClient!==false,
      travauxNom: d.travauxNom||'', travauxAdresse: d.travauxAdresse||'', travauxCp: d.travauxCp||'', travauxVille: d.travauxVille||'',
      lignes: JSON.parse(JSON.stringify(d.lignes)), tva: d.tva, notes: '',
      editingDocId: d.id,
    };
    state.viewingDoc = null;
    state.tab = 'nouveau';
    render();
  };
  const deleteBtn = document.getElementById('delete-doc-btn');
  if(deleteBtn) deleteBtn.onclick = async ()=>{
    const d = state.documents.find(x=>x.id===state.viewingDoc);
    if(!d) return;
    if(!confirm(`Supprimer d\u00e9finitivement le ${d.type} ${d.numero} ? Cette action est irr\u00e9versible.`)) return;
    state.documents = state.documents.filter(x=>x.id!==d.id);
    await sset('documents', state.documents);
    showToast(d.numero + ' supprim\u00e9');
    state.viewingDoc = null;
    render();
  };
  const tfb = document.getElementById('to-facture-btn');
  if(tfb) tfb.onclick = async ()=>{
    const d = state.documents.find(x=>x.id===state.viewingDoc);
    state.counters.facture += 1;
    const numero = 'F-' + new Date().getFullYear() + '-' + String(state.counters.facture).padStart(4,'0');
    const facture = Object.assign(JSON.parse(JSON.stringify(d)), { id: uid(), type:'facture', numero, date: todayStr(), parentDevisId: d.id });
    state.documents.push(facture);
    await sset('documents', state.documents);
    await sset('counters', state.counters);
    showToast('Facture ' + numero + ' cr\u00e9\u00e9e');
    state.viewingDoc = facture.id;
    render();
  };
}

function findVal(row, keys){
  const normalized = {};
  Object.keys(row).forEach(k=>{ normalized[k.toString().trim().toLowerCase()] = row[k]; });
  for(const k of keys){
    if(normalized[k] !== undefined && normalized[k] !== null && normalized[k] !== '') return normalized[k];
  }
  return '';
}
function exportToExcel(rows, filename, sheetName){
  if(typeof XLSX === 'undefined'){ showToast("Biblioth\u00e8que Excel non charg\u00e9e (v\u00e9rifiez la connexion internet)"); return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, filename);
}
function importFromExcel(file, cb){
  if(!file) return;
  if(typeof XLSX === 'undefined'){ showToast("Biblioth\u00e8que Excel non charg\u00e9e (v\u00e9rifiez la connexion internet)"); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      cb(rows);
    }catch(err){ showToast("Impossible de lire ce fichier"); console.error(err); }
  };
  reader.readAsArrayBuffer(file);
}

(async function init(){
  try{ if(localStorage.getItem(AUTH_KEY) === '1') state.authenticated = true; }catch(e){}
  initFirebase();
  try{
    await withTimeout(loadAll(), 10000);
  }catch(e){
    console.error('Chargement trop long, d\u00e9marrage avec les donn\u00e9es disponibles', e);
  }
  render();
})();
</script>
